<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bigfoot Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="images/bigfoot-icon.jpg" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.fullscreen/Control.FullScreen.css"
    />
  </head>
  <body>
    <header>The BigFoot Tracker App</header>
    <!-- MAP CONTAINER =========================================== -->
    <div id="map"></div>
    <!-- CONTROLS SECTION ============================================ -->
    <section id="controls">
      <div class="control-left">
        <!-- STATE DROPDOWN FILTER ========================================== -->
        <div id="states">
          <label for="stateSelect">Filter by State:</label>
          <select id="stateSelect">
            <option value="all">All States</option>
            <option value="Washington">Washington</option>
            <option value="Oregon">Oregon</option>
            <option value="California">California</option>
            <option value="Ohio">Ohio</option>
            <option value="Florida">Florida</option>
            <option value="Alabama">Alabama</option>
            <option value="Alaska">Alaska</option>
            <option value="Arizona">Arizona</option>
            <option value="Arkansas">Arkansas</option>
            <option value="Colorado">Colorado</option>
            <option value="Connecticut">Connecticut</option>
            <option value="Delaware">Delaware</option>
            <option value="Georgia">Georgia</option>
            <option value="Hawaii">Hawaii</option>
            <option value="Idaho">Idaho</option>
            <option value="Illinois">Illinois</option>
            <option value="Indiana">Indiana</option>
            <option value="Iowa">Iowa</option>
            <option value="Kansas">Kansas</option>
            <option value="Kentucky">Kentucky</option>
            <option value="Louisiana">Louisiana</option>
            <option value="Maine">Maine</option>
            <option value="Maryland">Maryland</option>
            <option value="Massachusetts">Massachusetts</option>
            <option value="Michigan">Michigan</option>
            <option value="Minnesota">Minnesota</option>
            <option value="Mississippi">Mississippi</option>
            <option value="Missouri">Missouri</option>
            <option value="Montana">Montana</option>
            <option value="Nebraska">Nebraska</option>
            <option value="Nevada">Nevada</option>
            <option value="New Hampshire">New Hampshire</option>
            <option value="New Jersey">New Jersey</option>
            <option value="New Mexico">New Mexico</option>
            <option value="New York">New York</option>
            <option value="North Carolina">North Carolina</option>
            <option value="North Dakota">North Dakota</option>
            <option value="Oklahoma">Oklahoma</option>
            <option value="Pennsylvania">Pennsylvania</option>
            <option value="Rhode Island">Rhode Island</option>
            <option value="South Carolina">South Carolina</option>
            <option value="South Dakota">South Dakota</option>
            <option value="Tennessee">Tennessee</option>
            <option value="Texas">Texas</option>
            <option value="Utah">Utah</option>
            <option value="Vermont">Vermont</option>
            <option value="Virginia">Virginia</option>
            <option value="West Virginia">West Virginia</option>
            <option value="Wisconsin">Wisconsin</option>
            <option value="Wyoming">Wyoming</option>
          </select>
        </div>

        <!-- DECADE DROPDOWN FILTER
             =============================== -->
        <div id="year">
          <label for="selectDecade">Filter by Decade:</label>
          <select id="selectDecade">
            <option value="all">All Years</option>
            <option value="2020">2020s</option>
            <option value="2010">2010s</option>
            <option value="2000">2000s</option>
            <option value="1990">1990s</option>
            <option value="1980">1980s</option>
            <option value="1970">1970s</option>
            <option value="1960">1960s</option>
            <option value="1950">1950s</option>
            <option value="1940">1940s</option>
            <option value="1930">1930s</option>
            <option value="1920">1920s</option>
            <option value="1910">1910s</option>
            <option value="1900">1900s</option>
          </select>
        </div>
      </div>

      <!-- BUTTON LINKS SECTION ======================================= -->
      <div class="control-right">
        <button
          class="btn"
          onclick="window.open('https://hub.arcgis.com/datasets/ECU::bigfoot-locations/about', '_blank')"
        >
          API Source
        </button>
        <button
          class="btn"
          onclick="window.open('https://services2.arcgis.com/sJvSsHKKEOKRemAr/arcgis/rest/services/Bigfoot%20Locations/FeatureServer/0/query?outFields=*&where=1%3D1&f=geojson', '_blank')"
        >
          Data Set
        </button>
      </div>
    </section>
    <!-- FOOTER SECTION ============================================== -->
    <footer>Module-3 Milestone-2</footer>

    <!-- SCRIPTS ===================================================== -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.fullscreen/Control.FullScreen.js"></script>
    <script src="app.js"></script>
  </body>
</html>
